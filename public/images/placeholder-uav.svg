<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%" style="background-color: #1e293b; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C1121F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7A0C14;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Grid background for technical blueprint style -->
  <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450 M 0,500 L 800,500 M 0,550 L 800,550" stroke="#334155" stroke-width="1" fill="none" />
  <path d="M 100,0 L 100,600 M 200,0 L 200,600 M 300,0 L 300,600 M 400,0 L 400,600 M 500,0 L 500,600 M 600,0 L 600,600 M 700,0 L 700,600" stroke="#334155" stroke-width="1" fill="none" />
  
  <!-- UAV schematic drone wings -->
  <line x1="250" y1="300" x2="550" y2="300" stroke="url(#grad1)" stroke-width="12" stroke-linecap="round" />
  <line x1="400" y1="200" x2="400" y2="400" stroke="url(#grad1)" stroke-width="12" stroke-linecap="round" />
  
  <!-- Rotors -->
  <circle cx="250" cy="300" r="24" fill="none" stroke="#64748b" stroke-width="4" stroke-dasharray="8 4" />
  <circle cx="550" cy="300" r="24" fill="none" stroke="#64748b" stroke-width="4" stroke-dasharray="8 4" />
  <circle cx="400" cy="200" r="24" fill="none" stroke="#64748b" stroke-width="4" stroke-dasharray="8 4" />
  <circle cx="400" cy="400" r="24" fill="none" stroke="#64748b" stroke-width="4" stroke-dasharray="8 4" />
  
  <circle cx="250" cy="300" r="6" fill="#fff" />
  <circle cx="550" cy="300" r="6" fill="#fff" />
  <circle cx="400" cy="200" r="6" fill="#fff" />
  <circle cx="400" cy="400" r="6" fill="#fff" />
  
  <!-- Fuselage / Core -->
  <rect x="360" y="270" width="80" height="60" rx="15" fill="#f8fafc" stroke="url(#grad1)" stroke-width="4" />
  <circle cx="400" cy="300" r="16" fill="#0B1424" stroke="#fff" stroke-width="2" />
  
  <!-- Tech lines and text -->
  <text x="50" y="550" font-family="monospace" font-size="16" fill="#94a3b8">APTRG RESEARCH LAB // SYSTEM SCHEMATIC</text>
  <text x="50" y="575" font-family="monospace" font-size="12" fill="#64748b">UAV OTONOM BLUEPRINT DESIGN V1.0</text>
</svg>
